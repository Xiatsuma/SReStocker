name: QuantumROM Tools Sixteen.

on:
  workflow_dispatch:
    inputs:
      STOCK_DEVICE:
        description: "STOCK_DEVICE_MODEL or None"
        required: true
        default: "SM-A346E"
      USE_UI_8_TETHERING_APEX:
        description: "Set True if your kernel BPF version is 5.4 (lower than 5.10)."
        required: true
        default: "False"
      SAMFW_URL:
        description: "Direct SamFW Download URL (.zip)"
        required: true
      OUTPUT_FILESYSTEM:
        description: "OUTPUT_FILESYSTEM. e.g erofs / ext4"
        required: true
        default: "erofs"
      COMPRESS_IMG_TO_XZ:
        description: "Compress IMG to XZ (True/False)"
        required: true
        default: "False"

jobs:
  build:
    name: Start QuantumROM Tools Sixteen.
    runs-on: ubuntu-24.04
    env:
      SAMFW_URL: ${{ inputs.SAMFW_URL }}

    steps:
      - name: Checkout repository.
        uses: actions/checkout@v4

      - name: Validate STOCK_DEVICE
        run: |
          STOCK_DEVICE="${{ github.event.inputs.STOCK_DEVICE }}"
          DEVICE_PATH="QuantumROM/Devices/$STOCK_DEVICE"
          if [ "$STOCK_DEVICE" != "None" ] && [ ! -d "$DEVICE_PATH" ]; then
            echo "❌ $STOCK_DEVICE is not supported with this tool."
            exit 1
          fi

      - name: Install Dependencies.
        run: |
          sudo apt install -y p7zip-full lz4 android-sdk-libsparse-utils f2fs-tools fuse2fs fuse e2fsprogs python3 python3-pip zipalign unzip openjdk-17-jdk jq wget >/dev/null 2>&1
          bash scripts/setup_directories.sh FIRMWARE WORK OUT

      - name: Download firmware via SamFW
        run: |
          source scripts/QuantumRom.sh
          DOWNLOAD_FIRMWARE "DUMMY" "DUMMY" "DUMMY" "FIRMWARE"

      - name: Start Rom Build For ${{ github.event.inputs.STOCK_DEVICE }}
        run: |
          sudo bash sixteen.sh \
            "${{ github.event.inputs.STOCK_DEVICE }}" \
            "${{ github.event.inputs.USE_UI_8_TETHERING_APEX }}" \
            "DUMMY" \
            "DUMMY" \
            "DUMMY" \
            "${{ github.event.inputs.OUTPUT_FILESYSTEM }}"

      - name: Compress all .img & make zip file before upload.
        run: |
          echo "BUILD_TIME=$(TZ='Asia/Dhaka' date '+%Y-%m-%d %I:%M:%S %p UTC+6')" >> $GITHUB_ENV
          OUT_DIR="$(pwd)/OUT"
          ZIP_NAME="${{ github.event.inputs.STOCK_DEVICE }}_Port.zip"
          ZIP_PATH="$OUT_DIR/$ZIP_NAME"

          # Keep only the 3 partition images
          ALLOWED="system.img system_ext.img product.img"
          for f in "$OUT_DIR"/*.img; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            keep=0
            for allowed in $ALLOWED; do
              [ "$fname" = "$allowed" ] && keep=1 && break
            done
            if [ $keep -eq 0 ]; then
              echo "Removing unwanted image: $fname"
              sudo rm -f "$f"
            fi
          done

          # Remove any non-img files from OUT (boot, twrp, etc)
          for f in "$OUT_DIR"/*; do
            [ -f "$f" ] || continue
            case "$f" in
              *.img) ;;
              *) echo "Removing: $(basename "$f")"; sudo rm -f "$f" ;;
            esac
          done

          if [ "${{ github.event.inputs.COMPRESS_IMG_TO_XZ }}" = "True" ]; then
            echo "Compressing all .img files to .xz (level 9)..."
            for img in "$OUT_DIR"/*.img; do
              [ -f "$img" ] || continue
              echo "Compressing $img"
              sudo xz -9 -T0 "$img"
            done
          fi

          echo "Creating zip: $ZIP_NAME"
          7z a -tzip "$ZIP_PATH" "$OUT_DIR"/*.img "$OUT_DIR"/*.xz -mx=5 2>/dev/null || 7z a -tzip "$ZIP_PATH" "$OUT_DIR"/*.img -mx=5
          echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV

      - name: Upload file in GoFile & Create Release.
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          STOCK_DEVICE: ${{ github.event.inputs.STOCK_DEVICE }}
          OUTPUT_FILESYSTEM: ${{ github.event.inputs.OUTPUT_FILESYSTEM }}
          COMPRESS_IMG_TO_XZ: ${{ github.event.inputs.COMPRESS_IMG_TO_XZ }}
          USE_UI_8_TETHERING_APEX: ${{ github.event.inputs.USE_UI_8_TETHERING_APEX }}
        run: |
           bash release.sh

      - name: Clean everything.
        run: sudo rm -rf *

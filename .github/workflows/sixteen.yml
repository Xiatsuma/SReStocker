name: SReStocker Sixteen

on:
  workflow_dispatch:
    inputs:
      STOCK_DEVICE:
        description: "STOCK_DEVICE model or None"
        required: true
        default: "SM-A346E"
      USE_UI_8_TETHERING_APEX:
        description: "True if kernel BPF is 5.4 (lower than 5.10)"
        required: true
        default: "False"
      SAMFW_URL:
        description: "Direct SamFW download URL (.zip)"
        required: true
      OUTPUT_FILESYSTEM:
        description: "erofs or ext4"
        required: true
        default: "erofs"
      COMPRESS_IMG_TO_XZ:
        description: "Compress img files to xz (True/False)"
        required: true
        default: "False"

jobs:
  build:
    name: Build SReStocker Port
    runs-on: ubuntu-24.04
    env:
      SAMFW_URL: ${{ inputs.SAMFW_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate STOCK_DEVICE
        run: |
          STOCK_DEVICE="${{ github.event.inputs.STOCK_DEVICE }}"
          DEVICE_PATH="QuantumROM/Devices/$STOCK_DEVICE"
          if [ "$STOCK_DEVICE" != "None" ] && [ ! -d "$DEVICE_PATH" ]; then
            echo "Unsupported STOCK_DEVICE: $STOCK_DEVICE"
            exit 1
          fi

      - name: Install dependencies
        run: |
          sudo apt update -y >/dev/null 2>&1
          sudo apt install -y p7zip-full lz4 android-sdk-libsparse-utils f2fs-tools fuse2fs fuse e2fsprogs python3 python3-pip zipalign unzip openjdk-17-jdk jq wget >/dev/null 2>&1
          bash scripts/setup_directories.sh FIRMWARE WORK OUT

      - name: Download firmware via SamFW
        run: |
          source scripts/QuantumRom.sh
          DOWNLOAD_FIRMWARE "DUMMY" "DUMMY" "DUMMY" "FIRMWARE"

      - name: Start build
        run: |
          sudo bash sixteen.sh \
            "${{ github.event.inputs.STOCK_DEVICE }}" \
            "${{ github.event.inputs.USE_UI_8_TETHERING_APEX }}" \
            "DUMMY" \
            "DUMMY" \
            "DUMMY" \
            "${{ github.event.inputs.OUTPUT_FILESYSTEM }}"

      - name: Package output
        run: |
          echo "BUILD_TIME=$(TZ='UTC' date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV
          OUT_DIR="$(pwd)/OUT"
          ZIP_NAME="${{ github.event.inputs.STOCK_DEVICE }}_Port.zip"
          ZIP_PATH="$OUT_DIR/$ZIP_NAME"

          # keep only built partition images
          ALLOWED="system.img system_ext.img product.img"
          for f in "$OUT_DIR"/*.img; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            keep=0
            for a in $ALLOWED; do
              [ "$fname" = "$a" ] && keep=1 && break
            done
            [ $keep -eq 1 ] || sudo rm -f "$f"
          done

          # remove non-image files
          for f in "$OUT_DIR"/*; do
            [ -f "$f" ] || continue
            case "$f" in
              *.img) ;;
              *) sudo rm -f "$f" ;;
            esac
          done

          if [ "${{ github.event.inputs.COMPRESS_IMG_TO_XZ }}" = "True" ]; then
            for img in "$OUT_DIR"/*.img; do
              [ -f "$img" ] || continue
              sudo xz -9 -T0 "$img"
            done
          fi

          7z a -tzip "$ZIP_PATH" "$OUT_DIR"/*.img "$OUT_DIR"/*.xz -mx=5 2>/dev/null || 7z a -tzip "$ZIP_PATH" "$OUT_DIR"/*.img -mx=5
          echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV

      - name: Upload + Release
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          STOCK_DEVICE: ${{ github.event.inputs.STOCK_DEVICE }}
          OUTPUT_FILESYSTEM: ${{ github.event.inputs.OUTPUT_FILESYSTEM }}
          COMPRESS_IMG_TO_XZ: ${{ github.event.inputs.COMPRESS_IMG_TO_XZ }}
          USE_UI_8_TETHERING_APEX: ${{ github.event.inputs.USE_UI_8_TETHERING_APEX }}
        run: |
          bash release.sh

      - name: Cleanup
        run: sudo rm -rf *
        

name: Build Mods Bundle

on:
  workflow_dispatch:
    inputs:
      SAMFW_URL:
        description: "Direct SamFW download URL (.zip)"
        required: true

jobs:
  build:
    name: Build Apps.zip
    runs-on: ubuntu-24.04
    env:
      SAMFW_URL: ${{ inputs.SAMFW_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt install -y p7zip-full lz4 android-sdk-libsparse-utils f2fs-tools fuse2fs fuse e2fsprogs python3 python3-pip zipalign unzip openjdk-17-jdk jq wget
          bash scripts/setup_directories.sh FIRMWARE WORK OUT

      - name: Download firmware via SamFW
        run: |
          source scripts/QuantumRom.sh
          DOWNLOAD_FIRMWARE "MODS_TEMP" "FIRMWARE"

      - name: Extract firmware
        run: |
          source scripts/QuantumRom.sh
          EXTRACT_FIRMWARE "FIRMWARE/MODS_TEMP"
          EXTRACT_FIRMWARE_IMG "FIRMWARE/MODS_TEMP"

      - name: Collect SamsungSmartSuggestions
        run: |
          mkdir -p MODS_OUT/Apps/SamsungSmartSuggestions
          
          APP_PATH=$(find FIRMWARE/MODS_TEMP -type d -name "SamsungSmartSuggestions" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: SamsungSmartSuggestions not found"
            exit 1
          fi
          echo "Found: $APP_PATH"
          
          REL_PATH="${APP_PATH#FIRMWARE/MODS_TEMP/}"
          mkdir -p "MODS_OUT/Apps/SamsungSmartSuggestions/$(dirname "$REL_PATH")"
          cp -ra "$APP_PATH" "MODS_OUT/Apps/SamsungSmartSuggestions/$REL_PATH"
          
          for perm_dir in $(find FIRMWARE/MODS_TEMP -type d -name "permissions" -path "*/etc/*"); do
            for xml in "$perm_dir"/*SamsungSmartSuggestions* "$perm_dir"/*SmartSuggest* 2>/dev/null; do
              if [ -f "$xml" ]; then
                PERM_REL="${xml#FIRMWARE/MODS_TEMP/}"
                mkdir -p "MODS_OUT/Apps/SamsungSmartSuggestions/$(dirname "$PERM_REL")"
                cp -a "$xml" "MODS_OUT/Apps/SamsungSmartSuggestions/$PERM_REL"
                echo "Copied: $(basename "$xml")"
              fi
            done
          done
          
          echo "Collected:"
          find MODS_OUT -type f

      - name: Download base Apps.zip and merge
        run: |
          curl -L -o base_Apps.zip "https://github.com/Xiatsuma/SReStocker-Mods/releases/download/v1.0/Apps.zip"
          mkdir -p base_apps
          unzip -q base_Apps.zip -d base_apps
          cp -ra MODS_OUT/Apps/* base_apps/Apps/
          cd base_apps
          7z a -tzip ../Apps.zip .
          cd ..
          echo "Done. Size: $(du -h Apps.zip | cut -f1)"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mods Bundle"
          tag_name: "mods-$(date +%Y%m%d%H%M%S)"
          files: Apps.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
